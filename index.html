<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SkyTrack Security | v2.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary-color: #00ff41; --highlight-color: #fffb00; --bg-color: #050505; --panel-bg: rgba(10, 10, 10, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); color: var(--primary-color); font-family: sans-serif; overflow: hidden; }
        #header { position: absolute; top: 0; width: 100%; background: var(--panel-bg); border-bottom: 1px solid var(--primary-color); z-index: 1001; padding: 8px; display: flex; justify-content: space-between; box-sizing: border-box; font-size: 0.7rem; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        #config-panel { position: absolute; top: 45px; right: 10px; z-index: 1001; background: var(--panel-bg); border: 1px solid #444; padding: 12px; border-radius: 8px; width: 200px; font-size: 0.8rem; }
        #config-panel input { background: #222; border: 1px solid var(--primary-color); color: white; padding: 8px; width: 100%; margin: 5px 0; border-radius: 4px; box-sizing: border-box; }
        #config-panel button { background: var(--primary-color); border: none; color: black; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-top: 5px; }
        #radar-list { position: absolute; bottom: 20px; left: 10px; z-index: 1001; background: var(--panel-bg); border: 1px solid var(--primary-color); padding: 12px; border-radius: 8px; width: 280px; max-height: 35vh; overflow-y: auto; }
        .plane-item { border-left: 3px solid var(--primary-color); padding: 8px; margin-bottom: 8px; background: rgba(255,255,255,0.05); font-size: 0.8rem; }
        .plane-item.closest { border-left-color: var(--highlight-color); background: rgba(255, 251, 0, 0.1); }
        .eta-tag { color: var(--highlight-color); font-weight: bold; }
        @media (max-width: 600px) {
            #config-panel { width: calc(100% - 20px); left: 10px; top: auto; bottom: 10px; display: flex; gap: 5px; align-items: flex-end; }
            #radar-list { width: calc(100% - 20px); left: 10px; bottom: 85px; }
        }
        .plane-icon { font-size: 22px; }
        #auth-status { font-size: 0.6rem; color: #888; }
    </style>
</head>
<body>

    <div id="header">
        <div>SKYTRACK V2.3 <span id="auth-status"></span></div>
        <div id="clock">00:00:00</div>
    </div>

    <div id="config-panel">
        <input type="number" id="lat-input" step="0.0001" placeholder="Latitud">
        <input type="number" id="lon-input" step="0.0001" placeholder="Longitud">
        <button onclick="updateLocation()">ACTUALIZAR</button>
        <button onclick="resetAuth()" style="background:#444; color:white; font-size:0.6rem; margin-top:10px">CERRAR SESIÓN</button>
    </div>

    <div id="radar-list">
        <div id="plane-container">Iniciando sistema...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- GESTIÓN DE PRIVACIDAD (PUNTO 1) ---
        let OS_USER = localStorage.getItem('os_user');
        let OS_PASS = localStorage.getItem('os_pass');

        if (!OS_USER || !OS_PASS) {
            OS_USER = prompt("Introduce tu usuario de OpenSky:");
            OS_PASS = prompt("Introduce tu contraseña de OpenSky:");
            if (OS_USER && OS_PASS) {
                localStorage.setItem('os_user', OS_USER);
                localStorage.setItem('os_pass', OS_PASS);
            }
        }

        function resetAuth() {
            localStorage.removeItem('os_user');
            localStorage.removeItem('os_pass');
            location.reload();
        }

        // --- CONFIGURACIÓN RADAR ---
        let HOME_LAT = parseFloat(localStorage.getItem('savedLat')) || 36.73541;
        let HOME_LON = parseFloat(localStorage.getItem('savedLon')) || -4.60571;
        const RANGE = 0.5;
        let planesMarkers = {};
        let homeMarker;

        document.getElementById('lat-input').value = HOME_LAT;
        document.getElementById('lon-input').value = HOME_LON;
        document.getElementById('auth-status').innerText = OS_USER ? `| SESIÓN: ${OS_USER}` : '| MODO ANÓNIMO';

        const map = L.map('map', { zoomControl: false }).setView([HOME_LAT, HOME_LON], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function setHomeMarker() {
            if (homeMarker) map.removeLayer(homeMarker);
            homeMarker = L.circleMarker([HOME_LAT, HOME_LON], { radius: 8, color: 'red' }).addTo(map);
        }
        setHomeMarker();

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function fetchPlanes() {
            const url = `https://opensky-network.org/api/states/all?lamin=${HOME_LAT-RANGE}&lomin=${HOME_LON-RANGE}&lamax=${HOME_LAT+RANGE}&lomax=${HOME_LON+RANGE}`;
            const headers = {};
            
            if (OS_USER && OS_PASS) {
                headers['Authorization'] = 'Basic ' + btoa(OS_USER + ':' + OS_PASS);
            }

            try {
                const res = await fetch(url, { headers });
                if (res.status === 429) {
                    document.getElementById('plane-container').innerHTML = "⚠️ Límite API. Espera 2 min.";
                    return;
                }
                const data = await res.json();
                processData(data.states || []);
            } catch (e) {
                document.getElementById('plane-container').innerHTML = "❌ Error de conexión.";
            }
        }

        function processData(states) {
            const container = document.getElementById('plane-container');
            container.innerHTML = states.length === 0 ? "📡 Sin tráficos en zona" : "";
            const currentIds = new Set();
            
            let planesInfo = states.map(p => {
                const dist = getDistance(HOME_LAT, HOME_LON, p[6], p[5]);
                const speed = (p[9] || 0) * 3.6;
                const eta = speed > 50 ? (dist / speed) * 60 : null;
                return { id: p[0], call: p[1].trim() || 'Vuelo', lat: p[6], lon: p[5], track: p[10], dist, eta, alt: p[7] };
            }).sort((a, b) => a.dist - b.dist);

            planesInfo.forEach((p, index) => {
                currentIds.add(p.id);
                const isClosest = index === 0;

                if (p.lat && p.lon) {
                    if (planesMarkers[p.id]) {
                        planesMarkers[p.id].setLatLng([p.lat, p.lon]);
                        planesMarkers[p.id].getElement().firstChild.style.transform = `rotate(${p.track-45}deg)`;
                    } else {
                        const icon = L.divIcon({
                            className: 'plane-icon',
                            html: `<div style="color: ${isClosest ? 'var(--highlight-color)' : 'var(--primary-color)'}; transform: rotate(${p.track-45}deg);">✈</div>`,
                            iconSize: [24, 24]
                        });
                        planesMarkers[p.id] = L.marker([p.lat, p.lon], {icon}).addTo(map);
                    }
                }

                const item = document.createElement('div');
                item.className = `plane-item ${isClosest ? 'closest' : ''}`;
                item.innerHTML = `<strong>${p.call}</strong> · ${p.dist.toFixed(1)}km<br>
                                  Alt: ${Math.round(p.alt)}m · ${p.eta ? `<span class="eta-tag">${Math.round(p.eta)} min</span>` : '---'}`;
                container.appendChild(item);
            });

            Object.keys(planesMarkers).forEach(id => {
                if (!currentIds.has(id)) { map.removeLayer(planesMarkers[id]); delete planesMarkers[id]; }
            });
        }

        function updateLocation() {
            HOME_LAT = parseFloat(document.getElementById('lat-input').value);
            HOME_LON = parseFloat(document.getElementById('lon-input').value);
            localStorage.setItem('savedLat', HOME_LAT);
            localStorage.setItem('savedLon', HOME_LON);
            map.panTo([HOME_LAT, HOME_LON]);
            setHomeMarker();
            fetchPlanes();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        setInterval(fetchPlanes, 15000);
        fetchPlanes();
    </script>
</body>
</html>
